# Evaluation Configuration
# Run batch evaluations on task sets

# Model configuration
model:
  task: "openai/gpt-oss-120b"  # Default model via OpenRouter
  reflection: "openai/gpt-oss-120b"

# Parallelism configuration
workers:
  count: 5
  auto_detect: false

# Skill configuration (set no_skill: true for baseline, or path to skill file)
skill:
  path: null
  no_skill: true

# Task selection configuration
tasks:
  dir: "tasks"
  splits:
    - dev
    - held_out
  difficulty: null
  packages: null

# Execution settings
execution:
  timeout: 600
  docker_image: "posit-gskill-eval:latest"
  repeats: 1

# Output settings
output:
  dir: "results/evaluations"
  save_trajectories: true
