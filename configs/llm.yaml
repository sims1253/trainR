# LLM Configuration
# Single source of truth for all model definitions
# Reference models by name in other configs (benchmark.yaml, mining.yaml, CLI)

# Provider configurations (shared across models using this provider)
providers:
  opencode:
    base_url: "https://opencode.ai/zen/v1"
    api_key_env: "OPENCODE_API_KEY"
    litellm_prefix: "openai"  # Transform to openai/{model} for LiteLLM
    supports_response_format: true
    
  openrouter:
    base_url: null  # LiteLLM handles this natively
    api_key_env: "OPENROUTER_API_KEY"
    litellm_prefix: "openrouter"  # Prepend openrouter/ for LiteLLM
    supports_response_format: true
    
  zai:
    base_url: "https://api.z.ai/v1"
    api_key_env: "Z_AI_API_KEY"
    litellm_prefix: "openai"

# Model definitions
# Each model has: id (full model path), provider, capabilities
# Use the 'name' field to reference this model elsewhere
models:
  # OpenCode free models
  glm-5:
    id: "glm-5-free"
    provider: opencode
    capabilities:
      reasoning: true        # Puts content in reasoning_content field
      json_mode: prompt      # "native" | "prompt" | "none" - how to get JSON output
      max_tokens_default: 2000
      
  # kimi-k2.5:
    # id: "kimi-k2.5"
    # provider: opencode
    # capabilities:
      # reasoning: true
      # json_mode: prompt
      # max_tokens_default: 2000
      
  minimax-m2.5:
    id: "minimax-m2.5-free"
    provider: opencode
    capabilities:
      reasoning: false
      json_mode: prompt
      max_tokens_default: 2000
      
  # gpt-5-nano:
  #   id: "gpt-5-nano"
  #   provider: opencode
  #   capabilities:
  #     reasoning: false
  #     json_mode: native
  #     max_tokens_default: 1000
  #     drop_params: [temperature]  # These params are not supported
      
  # OpenRouter models
  gpt-oss-120b:
    id: "openai/gpt-oss-120b:free"
    provider: openrouter
    capabilities:
      reasoning: false
      json_mode: native
      
  step-3.5-flash:
    id: "stepfun/step-3.5-flash"
    provider: openrouter
    capabilities:
      reasoning: false
      json_mode: native
      
  trinity-large-preview:
    providers:
      - id: "arcee-ai/trinity-large-preview:free"
        provider: openrouter
      - id: "trinity-large-preview-free"
        provider: opencode
    capabilities:
      - reasoning
    max_tokens_default: 8192
      
  nemotron-3-nano:
    id: "nvidia/nemotron-3-nano-30b-a3b"
    provider: openrouter
    capabilities:
      reasoning: false
      json_mode: prompt
      
  trinity-mini:
    id: "arcee-ai/trinity-mini"
    provider: openrouter
    capabilities:
      reasoning: false
      json_mode: native

# Default model assignments for different purposes
defaults:
  mining: glm-5
  task_agent: gpt-oss-120b
  reflection: glm-5
  judge: glm-5
