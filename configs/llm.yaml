# LLM Configuration - Single Source of Truth
# All LLM usage in trainR reads from this file
#
# LiteLLM docs: https://docs.litellm.ai/docs/providers
# OpenAI-compatible: https://docs.litellm.ai/docs/providers/openai_compatible

provider: openrouter

# API keys (set in environment):
# - OPENROUTER_API_KEY → openrouter
# - Z_AI_API_KEY → zai (Zhipu AI or Coding Plan)
# - GEMINI_API_KEY or GOOGLE_API_KEY → gemini
# - OPENAI_API_KEY → openai
# - ANTHROPIC_API_KEY → anthropic
# - OPENCODE_API_KEY → opencode (OpenCode Zen)

models:
  task_agent: openrouter/openai/gpt-oss-120b:free
  reflection: openrouter/openai/gpt-oss-120b:free

parameters:
  temperature: 0.3
  max_tokens: 4096

# Provider configurations
# Set base_url to override defaults (useful for alternative endpoints)
providers:
  openrouter:
    base_url: https://openrouter.ai/api/v1
    rpm_limit: 20
  
  zai:
    # Zhipu AI official endpoint (default)
    base_url: https://open.bigmodel.cn/api/paas/v4
    # For ZAI Coding Plan, uncomment:
    # base_url: https://api.zukijourney.com/v1
  
  gemini:
    base_url: https://generativelanguage.googleapis.com/v1beta
  
  openai:
    base_url: https://api.openai.com/v1
  
  anthropic:
    base_url: https://api.anthropic.com/v1
  
  opencode:
    # OpenCode Zen - uses OpenAI-compatible mode
    # LiteLLM uses: openai/<model> + api_base + api_key
    # Update this URL to match your OpenCode Zen deployment
    base_url: https://api.opencode.ai/v1

# Example configurations:
#
# --- OpenRouter (free tier) ---
# provider: openrouter
# models:
#   task_agent: openrouter/openai/gpt-oss-120b:free
#   reflection: openrouter/openai/gpt-oss-120b:free
#
# --- Z.AI Coding Plan ---
# provider: zai
# providers:
#   zai:
#     base_url: https://api.zukijourney.com/v1
# models:
#   task_agent: zai/glm-4-flash
#   reflection: zai/glm-4-flash
#
# --- OpenCode Zen ---
# provider: opencode
# models:
#   task_agent: glm-5  # No prefix needed (uses openai/ internally)
#   reflection: glm-5
#
# --- Gemini ---
# provider: gemini
# models:
#   task_agent: gemini/gemini-2.0-flash
#   reflection: gemini/gemini-2.0-flash

mining:
  min_quality_score: 7
  require_test_changes: true
  require_linked_issue: true
