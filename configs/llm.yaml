# LLM Configuration - Single Source of Truth
# LiteLLM providers: https://docs.litellm.ai/docs/providers

provider: openrouter

# API keys (environment variables):
# - OPENROUTER_API_KEY → openrouter
# - Z_AI_API_KEY → zai / zai_coding_plan
# - GEMINI_API_KEY → gemini
# - OPENCODE_API_KEY → opencode
# - OPENAI_API_KEY → openai
# - ANTHROPIC_API_KEY → anthropic

models:
  # Task agent: Runs in Docker, executes tests
  task_agent: openrouter/openai/gpt-oss-120b:free
  
  # Reflection: GEPA optimization judge
  reflection: openrouter/openai/gpt-oss-120b:free
  
  # Mining: PR quality evaluation (defaults to reflection model)
  # mining: openrouter/openai/gpt-oss-120b:free

parameters:
  temperature: 0.3
  max_tokens: 4096

# Custom endpoints (only for providers NOT natively supported by LiteLLM)
# LiteLLM natively supports: openrouter, zai, gemini, openai, anthropic
# 
# For custom endpoints, set base_url here AND use openai/ prefix in model name
custom_endpoints:
  opencode:
    base_url: https://api.opencode.ai/v1
  
  zai_coding_plan:
    base_url: https://api.zukijourney.com/v1

# PR mining thresholds
mining:
  min_quality_score: 7
  require_test_changes: true
  require_linked_issue: true
