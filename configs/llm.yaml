# LLM Configuration
# Single source of truth for all model definitions
# Reference models by name in other configs (benchmark.yaml, mining.yaml, CLI)

# Provider configurations (shared across models using this provider)
providers:
  opencode: # see https://opencode.ai/zen/v1/models
    base_url: "https://opencode.ai/zen/v1"
    api_key_env: "OPENCODE_API_KEY"
    api_style: "openai_compat"
    supports_response_format: true
    
  openrouter:
    base_url: "https://openrouter.ai/api/v1"
    api_key_env: "OPENROUTER_API_KEY"
    api_style: "openai_compat"
    supports_response_format: true
    
  zai:
    base_url: "https://api.z.ai/api/paas/v4"
    api_key_env: "Z_AI_API_KEY"
    api_style: "openai_compat"
    supports_response_format: true

  zai_coding_plan:
    base_url: "https://api.z.ai/api/coding/paas/v4"
    api_key_env: "Z_AI_API_KEY"
    api_style: "openai_compat"
    supports_response_format: true

  kimi_coding_plan:
    base_url: "https://api.kimi.com/coding/v1"
    api_key_env: "KIMI_API_KEY"
    api_style: "openai_compat"
    supports_response_format: true

  openai:
    base_url: null
    api_key_env: "OPENAI_API_KEY"
    api_style: "openai_native"
    supports_response_format: true
    
  anthropic:
    base_url: null
    api_key_env: "ANTHROPIC_API_KEY"
    api_style: "anthropic"
    supports_response_format: true
    
  gemini:
    base_url: null
    api_key_env: "GEMINI_API_KEY"
    api_style: "gemini"
    supports_response_format: true

# Model definitions
# Each model has: id (full model path), provider, capabilities
# Use the 'name' field to reference this model elsewhere
models:
  # Z.ai coding plan models
  zai/glm-5:
    id: "glm-5"
    provider: zai_coding_plan
    capabilities:
      reasoning: true
      json_mode: native
      max_tokens_default: 2000
      cost: [1, 3.2, 0.2, "NA"]

  zai/glm-4.7:
    id: "glm-4.7"
    provider: zai_coding_plan
    capabilities:
      reasoning: true
      json_mode: native
      max_tokens_default: 2000
      cost: [0.6, 2.2, 0.11, "NA"]

  zai/glm-4.6:
    id: "glm-4.6"
    provider: zai_coding_plan
    capabilities:
      reasoning: true
      json_mode: native
      max_tokens_default: 2000
      cost: [0.6, 2.2, 0.11, "NA"]

  zai/glm-4.5:
    id: "glm-4.5"
    provider: zai_coding_plan
    capabilities:
      reasoning: true
      json_mode: native
      max_tokens_default: 2000
      cost: [0.6, 2.2, 0.11, "NA"]

  zai/glm-4.5-air:
    id: "glm-4.5-air"
    provider: zai_coding_plan
    capabilities:
      reasoning: true
      json_mode: native
      max_tokens_default: 2000
      cost: [0.2, 1.1, 0.03, "NA"]

  zai/glm-4.5v:
    id: "glm-4.5v"
    provider: zai_coding_plan
    capabilities:
      reasoning: true
      json_mode: native
      vision: true
      max_tokens_default: 2000
      cost: [0.6, 1.8, 0.11, "NA"]

  zai/glm-4.6v:
    id: "glm-4.6v"
    provider: zai_coding_plan
    capabilities:
      reasoning: true
      json_mode: native
      vision: true
      max_tokens_default: 2000
      cost: [0.3, 0.9, 0.05, "NA"]

  # Kimi coding plan models
  kimi-k2.5:
    id: "k2p5"
    provider: kimi_coding_plan
    capabilities:
      reasoning: true
      json_mode: native
      max_tokens_default: 2000
      cost: [0.6, 3, 0.1, "NA"]

  # OpenCode free models
  opencode/glm-5-free:
    id: "glm-5-free"
    provider: opencode
    capabilities:
      reasoning: true        # Puts content in reasoning_content field
      json_mode: native      # "native" | "prompt" | "none" - how to get JSON output
      max_tokens_default: 2000
      cost: [1, 3.20, 0.2, "NA"]
      
  opencode/kimi-k2.5:
    id: "kimi-k2.5-free"
    provider: opencode
    capabilities:
      reasoning: true
      json_mode: prompt
      max_tokens_default: 2000
      cost: [0.6, 3, 0.1, "NA"]

  minimax-m2.1:
    id: "minimax-m2.1-free"
    provider: opencode
    capabilities:
      reasoning: true
      json_mode: prompt
      max_tokens_default: 2000
      cost: [0.3, 1.2, 0.03, "NA"]

  minimax-m2.5:
    id: "minimax-m2.5-free"
    provider: opencode
    capabilities:
      reasoning: true
      json_mode: prompt
      max_tokens_default: 2000
      cost: [0.3, 1.2, 0.03, "NA"]
      
  gpt-5-nano:
    id: "gpt-5-nano"
    provider: opencode
    capabilities:
      reasoning: false
      json_mode: native
      max_tokens_default: 1000
      cost: [0.005, 0.4, 0.005, "NA"]
      
  # OpenRouter models
  step-3.5-flash:
    id: "stepfun/step-3.5-flash:free"
    provider: openrouter
    capabilities:
      reasoning: false
      json_mode: native
      cost: [0.1, 0.3, 0.02, "NA"]
      
  trinity-large-preview:
    providers:
      - id: "arcee-ai/trinity-large-preview:free"
        provider: openrouter
      - id: "trinity-large-preview-free"
        provider: opencode
    capabilities:
      - reasoning
    max_tokens_default: 8192
    cost: ["NA", "NA", "NA", "NA"]
      
  nemotron-3-nano:
    id: "nvidia/nemotron-3-nano-30b-a3b:free"
    provider: openrouter
    capabilities:
      reasoning: false
      json_mode: prompt
      cost: [0.05, 0.2, "NA", "NA"]
      
  trinity-mini:
    id: "arcee-ai/trinity-mini:free"
    provider: openrouter
    capabilities:
      reasoning: false
      json_mode: native
      cost: [0.045, 0.15, "NA", "NA"]

  hermes-3-llama-3.1-405b:
    id: "nousresearch/hermes-3-llama-3.1-405b:free"
    provider: openrouter
    capabilities:
      reasoning: true
      json_mode: native
      cost: [1, 1, "NA", "NA"]

  qwen3-next-80b-a3b:
    id: "qwen/qwen3-next-80b-a3b-instruct:free"
    provider: openrouter
    capabilities:
      reasoning: true
      json_mode: native
      cost: [0.15, 1.2, "NA", "NA"]

# Default model assignments for different purposes
defaults:
  mining:  zai/glm-5
  task_agent:  kimi-k2.5
  reflection: zai/glm-5
  judge: zai/glm-5
