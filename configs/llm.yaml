# LLM Configuration - Single Source of Truth
# LiteLLM providers: https://docs.litellm.ai/docs/providers

provider: openrouter

# API keys (environment variables):
# - OPENROUTER_API_KEY → openrouter
# - Z_AI_API_KEY → zai / zai_coding_plan
# - GEMINI_API_KEY → gemini
# - OPENCODE_API_KEY → opencode
# - OPENAI_API_KEY → openai
# - ANTHROPIC_API_KEY → anthropic

# Default models
models:
  # Task agent: Runs in Docker, executes tasks
  task_agent: openrouter/openai/gpt-oss-120b:free
  
  # Reflection: GEPA optimization judge
  reflection: opencode/glm-5-free

  # Mining: PR quality evaluation
  mining: opencode/glm-5-free

# Custom endpoints (for providers NOT natively supported by LiteLLM)
custom_endpoints:
  opencode:
    base_url: https://opencode.ai/zen/v1
  zai_coding_plan:
    base_url: https://api.z.ai/api/coding/paas/v4
