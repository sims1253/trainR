# Quick benchmark config - single model, dev split only
models:
  - name: glm-4.7-flash
    provider: zai
    cc_mirror_provider: zai
    env:
      ANTHROPIC_BASE_URL: "https://api.z.ai/api/anthropic"
    description: "Fast z.ai model"

settings:
  repeats: 1
  timeout: 600
  docker_image: "posit-gskill-eval:latest"
  task_splits:
    - dev
  results_dir: "results/benchmarks"
  save_trajectories: true
