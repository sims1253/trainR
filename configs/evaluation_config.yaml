# Evaluation Configuration
# Settings for task evaluation in the Docker sandbox

# Docker Settings
docker:
  # Image name
  image: "posit-gskill-eval"
  
  # Image tag
  tag: "latest"
  
  # Container timeout in seconds
  container_timeout: 600
  
  # Memory limit per container (e.g., "2g", "512m")
  memory_limit: "2g"
  
  # CPU limit (number of CPUs)
  cpu_limit: 2
  
  # Network access (true for API calls, false for isolation)
  network_access: true
  
  # Volume mounts
  volumes:
    - "${PWD}/workspace:/workspace"

# LLM Provider Configuration (z.ai)
llm:
  # Agent type: "litellm" or "claude_code"
  agent_type: "${LLM_AGENT_TYPE:-litellm}"
  
  # Implementing agent model (fast test generation)
  model: "${LLM_MODEL_TASK:-openai/glm-4.7-flash}"
  
  # API endpoint (z.ai) - base URL only, LiteLLM appends /v1/messages
  api_base: "${LLM_API_BASE:-https://api.z.ai}"
  
  max_tokens: 4096
  temperature: 0.7
  
  claude_code:
    path: "${LLM_CLAUDE_CODE_PATH:-claude}"
    timeout: "${LLM_CLAUDE_CODE_TIMEOUT:-300}"

# Claude Code CLI Settings (for Docker container)
claude:
  # Path to Claude CLI (inside container)
  cli_path: "/usr/local/bin/claude"
  
  # Model to use (for CLI invocations)
  # This can be different from LLM model if CLI has its own config
  model: "claude-3-5-sonnet-20241022"
  
  # Max tokens for response
  max_tokens: 4096
  
  # Temperature
  temperature: 0.7
  
  # Timeout for CLI execution
  timeout: 300
  
  # Non-interactive mode
  non_interactive: true
  
  # Output format: json, text
  output_format: "json"

# Task Execution Settings
execution:
  # Pre-execution setup time (seconds)
  setup_timeout: 30
  
  # Test execution timeout (seconds)
  test_timeout: 120
  
  # Cleanup timeout (seconds)
  cleanup_timeout: 10
  
  # Maximum output size (bytes)
  max_output_size: 1048576  # 1MB

# Test Runner Settings
test_runner:
  # Test framework: testthat
  framework: "testthat"
  
  # R script path
  rscript_path: "/usr/bin/Rscript"
  
  # Test file pattern
  test_pattern: "test-.*\\.R$"
  
  # Run with coverage
  coverage: false
  
  # Verbose output
  verbose: true
  
  # Stop on first failure
  stop_on_failure: false

# Reflection Settings
reflection:
  # Enable reflection generation
  enabled: true
  
  # Model for reflection (uses LLM_MODEL_REFLECTION env var)
  model: "${LLM_MODEL_REFLECTION:-openai/gpt-5}"
  
  # Max tokens for reflection
  max_tokens: 1000
  
  # Temperature for reflection
  temperature: 0.5
  
  # Include full test output in reflection
  include_full_output: false
  
  # Generate improvement suggestions
  generate_suggestions: true

# Result Collection
results:
  # Output directory
  output_dir: "./results"
  
  # Save generated code
  save_generated_code: true
  
  # Save test output
  save_test_output: true
  
  # Save reflection records
  save_reflections: true
  
  # Compress old results
  compress_old: true
  
  # Retention period (days)
  retention_days: 30

# Batch Processing
batch:
  # Maximum concurrent evaluations
  max_concurrent: 4
  
  # Batch size for parallel processing
  batch_size: 10
  
  # Delay between batch starts (seconds)
  batch_delay: 5
  
  # Retry failed evaluations
  retry_failed: true
  
  # Maximum retries per task
  max_retries: 2

# Scoring
scoring:
  # Scoring method: binary, partial, weighted
  method: "partial"
  
  # Weights for partial scoring
  weights:
    syntax_correct: 0.2
    tests_run: 0.3
    tests_pass: 0.3
    coverage: 0.2
  
  # Bonus for using recommended patterns
  pattern_bonus: 0.1
  
  # Penalty for using anti-patterns
  anti_pattern_penalty: 0.1

# Monitoring
monitoring:
  # Enable progress tracking
  progress_tracking: true
  
  # Progress update interval (seconds)
  progress_interval: 10
  
  # Enable resource monitoring
  resource_monitoring: true
  
  # Alert on high resource usage
  resource_alerts: true
