# Smoke test configuration for skill optimization
# This is a minimal config for testing the optimization runner
#
# Usage:
#   uv run python scripts/run_optimize.py --config configs/optimize/skill_smoke.yaml

# Target configuration
target:
  type: skill
  skill_name: testing-r-packages

# Seed skill (starting point)
seed_skill: skills/minimal-seed.md

# Optimization objective
# Options: pass-rate, cost-adjusted, weighted-by-difficulty
objective: pass-rate

# Task configuration
tasks_dir: tasks
train_splits:
  - train
val_splits:
  - dev
max_train_tasks: 5  # Limit for smoke test
max_val_tasks: 2    # Limit for smoke test

# Holdout evaluation (final validation on held-out data)
holdout_splits:
  - held_out
max_holdout_tasks: 3

# Output configuration
output_dir: results/optimization

# Budget limits (smoke test - very limited)
budget:
  max_iterations: 10
  max_time_seconds: 300  # 5 minutes
  max_cost: 1.0  # $1 max
  checkpoint_interval: 2

# Model configuration
model: glm-4.5
aggregation: min
parallel: true

# Docker configuration
docker_image: posit-gskill-eval:latest

# Reflection model (optional, defaults to glm-5)
# reflection_lm: openai/glm-5
