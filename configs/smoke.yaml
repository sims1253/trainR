# Smoke Test Configuration
# Quick evaluation with minimal tasks for testing the pipeline

# Model configuration
model:
  task: "openai/gpt-oss-120b"
  reflection: "openai/gpt-oss-120b"

# Parallelism configuration (single worker for smoke test)
workers:
  count: 1
  auto_detect: false

# Skill configuration
skill:
  path: null
  no_skill: true

# Task selection (single split, will be limited to 1 task via --max-tasks)
tasks:
  dir: "tasks"
  splits:
    - dev
  difficulty: null
  packages: null

# Execution settings
execution:
  timeout: 300
  docker_image: "posit-gskill-eval:latest"
  repeats: 1

# Output settings
output:
  dir: "results/smoke"
  save_trajectories: true
