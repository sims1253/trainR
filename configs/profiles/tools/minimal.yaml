# Minimal Tool Profile Configuration
# Lightweight configuration for quick evaluations

# Schema version
schema_version: "1.0"

# Tool identification
tool_id: "r-eval"
name: "R Evaluation Tool (Minimal)"
version: "v1"
description: "Minimal R evaluation configuration for quick smoke tests"

# Tool configuration
config:
  parameters:
    r_version: "4.3"
    test_framework: "testthat"
    coverage_enabled: false
    strict_mode: false
    timeout_per_test: 30
  environment:
    NOT_CRAN: "true"
  mounts: []
  command: null
  args: []

# State
enabled: true

# Variant tracking
variant: "minimal"
base_version: "v1"

# Metadata
tags:
  - r
  - minimal
  - smoke-test
