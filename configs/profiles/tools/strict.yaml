# Strict Tool Profile Configuration
# Strict evaluation mode with comprehensive checks

# Schema version
schema_version: "1.0"

# Tool identification
tool_id: "r-eval"
name: "R Evaluation Tool (Strict)"
version: "patch_v1"
description: "Strict R evaluation with enhanced validation and coverage requirements"

# Tool configuration
config:
  parameters:
    r_version: "4.3"
    test_framework: "testthat"
    coverage_enabled: true
    strict_mode: true
    timeout_per_test: 120
    min_coverage_threshold: 80
    fail_on_warning: true
    check_doc: true
    check_examples: true
  environment:
    R_LIBS_USER: "/tmp/r_libs"
    NOT_CRAN: "true"
    _R_CHECK_FORCE_SUGGESTS_: "false"
  mounts:
    - "/var/run/docker.sock:/var/run/docker.sock"
  command: null
  args:
    - "--no-multiarch"
    - "--with-keep.source"
    - "--as-cran"

# State
enabled: true

# Variant tracking
variant: "strict"
base_version: "v1"

# Metadata
tags:
  - r
  - strict
  - coverage
  - cran-ready
