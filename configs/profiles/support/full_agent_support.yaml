# Support Profile: Full Agent Support
# Provides agent-style support with tools and multi-step reasoning

profile_id: "full_agent_support"
name: "Full Agent Support"
description: |
  Agent-style support with tools and skill instructions.
  No system prompt modification - agent handles everything.

mode: "agents_only"

skills:
  - name: "tdd-workflow"
    path: ".claude/skills/tdd/SKILL.md"
    priority: 10
    enabled: true

  - name: "refactor-workflow"
    path: ".claude/skills/refactor/SKILL.md"
    priority: 5
    enabled: true

  - name: "review-workflow"
    path: ".claude/skills/review/SKILL.md"
    priority: 3
    enabled: true

agent:
  enabled: true
  agent_type: "router"
  max_iterations: 15
  tools:
    - "read_file"
    - "write_file"
    - "run_tests"
    - "git_status"
    - "bash"
  prompt_template: |
    You are a development agent with access to multiple skills.
    Analyze the task and apply the appropriate workflow.
    Think step by step and verify your changes.

system_prompt:
  enabled: false

metadata:
  category: "development-workflow"
  tags:
    - "agent"
    - "tdd"
    - "refactor"
    - "review"
  version: "1.0"
