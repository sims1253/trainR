# Skill Selection Policies Configuration
# Defines policies for selectively choosing skills based on task context

# Default policy configuration
default_policy: "heuristic_balanced"

# Policy definitions
policies:
  # Heuristic-based policies
  heuristic_balanced:
    type: "heuristic"
    description: "Balanced heuristic matching using domains, tags, and keywords"
    min_score: 0.1
    max_skills: 5
    seed: null
    domain_weights:
      testing: 1.0
      tidyverse: 0.9
      metaprogramming: 0.8
      cli: 0.7
      package: 0.6
      performance: 0.5

  heuristic_strict:
    type: "heuristic"
    description: "Strict heuristic matching with higher thresholds"
    min_score: 0.3
    max_skills: 3
    seed: null
    domain_weights:
      testing: 1.2
      tidyverse: 1.0
      metaprogramming: 1.0
      cli: 0.8
      package: 0.7
      performance: 0.6

  heuristic_testing_focused:
    type: "heuristic"
    description: "Policy optimized for test generation tasks"
    min_score: 0.05
    max_skills: 4
    seed: null
    domain_weights:
      testing: 1.5
      tidyverse: 0.7
      metaprogramming: 0.5
      cli: 0.6
      package: 0.4
      performance: 0.3

  # Keyword-based policies
  keyword_loose:
    type: "keyword"
    description: "Loose keyword matching for broader skill selection"
    min_score: 0.05
    max_skills: 10
    keyword_weight: 0.3
    tag_weight: 0.3
    name_weight: 0.4

  keyword_strict:
    type: "keyword"
    description: "Strict keyword matching for focused skill selection"
    min_score: 0.2
    max_skills: 3
    keyword_weight: 0.4
    tag_weight: 0.4
    name_weight: 0.2

  keyword_balanced:
    type: "keyword"
    description: "Balanced keyword matching with equal weights"
    min_score: 0.1
    max_skills: 5
    keyword_weight: 0.33
    tag_weight: 0.33
    name_weight: 0.34

  # Deterministic variants (with fixed seed)
  heuristic_deterministic:
    type: "heuristic"
    description: "Heuristic matching with fixed seed for reproducibility"
    min_score: 0.1
    max_skills: 5
    seed: 42
    domain_weights:
      testing: 1.0
      tidyverse: 0.9
      metaprogramming: 0.8
      cli: 0.7
      package: 0.6

  keyword_deterministic:
    type: "keyword"
    description: "Keyword matching with fixed seed for reproducibility"
    min_score: 0.1
    max_skills: 5
    seed: 42
    keyword_weight: 0.33
    tag_weight: 0.33
    name_weight: 0.34

# Policy selection rules (optional)
# These rules allow automatic policy selection based on task characteristics
selection_rules:
  # Use testing-focused policy for test generation tasks
  - condition:
      task_type: "test_gen"
    policy: "heuristic_testing_focused"

  # Use strict policy for hard tasks
  - condition:
      difficulty: "hard"
    policy: "heuristic_strict"

  # Use balanced policy as default
  - condition: {}
    policy: "heuristic_balanced"
