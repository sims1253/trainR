# Support Profile: R Package Development (System Only)
# Provides R package development skills via system prompt injection

profile_id: "r_package_dev_system"
name: "R Package Development (System Only)"
description: |
  System prompt support for R package development tasks.
  Includes skills for tidyverse, testthat, and CRAN compliance.

mode: "system_only"

skills:
  - name: "r-tidyverse"
    path: ".claude/skills/r-tidyverse/SKILL.md"
    priority: 10
    enabled: true

  - name: "r-testing"
    path: ".claude/skills/r-testing/SKILL.md"
    priority: 5
    enabled: true

  - name: "cran-extrachecks"
    path: ".claude/skills/cran-extrachecks/SKILL.md"
    priority: 3
    enabled: true

agent:
  enabled: false
  agent_type: "default"
  max_iterations: 10

system_prompt:
  enabled: true
  base_prompt: |
    You are an expert R package developer. Follow tidyverse conventions and CRAN policies.
    Write clean, well-documented code with comprehensive tests.
  injection_point: "after_context"
  include_skill_metadata: true

metadata:
  category: "r-development"
  tags:
    - "r"
    - "tidyverse"
    - "testing"
    - "cran"
  version: "1.0"
