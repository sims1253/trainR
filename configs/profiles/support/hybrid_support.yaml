# Support Profile: Hybrid Support (System + Agents)
# Combined system prompt and agent-style support

profile_id: "hybrid_support"
name: "Hybrid Support"
description: |
  Combined system prompt with skill context AND agent-style support.
  Provides the most comprehensive support for complex tasks.

mode: "system_plus_agents"

skills:
  - name: "r-rlang"
    path: ".claude/skills/r-rlang/SKILL.md"
    priority: 15
    enabled: true

  - name: "r-tidyverse"
    path: ".claude/skills/r-tidyverse/SKILL.md"
    priority: 10
    enabled: true

  - name: "r-testing"
    path: ".claude/skills/r-testing/SKILL.md"
    priority: 8
    enabled: true

  - name: "cli-styling"
    path: ".claude/skills/cli/SKILL.md"
    priority: 5
    enabled: true

agent:
  enabled: true
  agent_type: "default"
  max_iterations: 10
  tools:
    - "read_file"
    - "write_file"
    - "run_tests"

system_prompt:
  enabled: true
  base_prompt: |
    You are an expert R package developer with deep knowledge of tidyverse,
    metaprogramming, and testing best practices.
    
    Approach each task methodically:
    1. Understand the requirements
    2. Design the solution
    3. Implement with tests
    4. Verify and document
  injection_point: "after_context"
  include_skill_metadata: true

metadata:
  category: "comprehensive"
  tags:
    - "r"
    - "tidyverse"
    - "rlang"
    - "testing"
    - "agent"
    - "hybrid"
  version: "1.0"
