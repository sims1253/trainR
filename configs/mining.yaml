# =============================================================================
# MINING SETTINGS
# =============================================================================
settings:
  # How many days back to look for merged PRs
  since_days: 30

  # Minimum quality score (1-10) required to include task
  min_quality_score: 7

  # Maximum PRs to process per repository
  max_prs_per_repo: 50

  # Only include PRs that modify test files
  require_test_changes: true

  # Only include PRs with linked issues
  require_linked_issue: true

  # LLM model to use for evaluation
  llm_model: "opencode/glm-5-free"

  # Rate limiting (requests per hour)
  rate_limit: 100

  # Output format
  output_format: "json"

  # Include full diff in output (can be large)
  include_full_diff: false

  # Retry settings for API failures
  retry_attempts: 3
  retry_delay_seconds: 5

# =============================================================================
# QUALITY CRITERIA
# =============================================================================
quality_criteria:
  # Minimum number of test assertions for a good task
  min_test_assertions: 2

  # Maximum number of files changed (too many = unclear scope)
  max_files_changed: 10

  # Preferred task types (in order of priority)
  preferred_types:
    - bug_fix
    - feature_impl
    - test_writing

  # Exclude PRs with these labels
  exclude_labels:
    - "documentation"
    - "dependencies"
    - "ci/cd"
