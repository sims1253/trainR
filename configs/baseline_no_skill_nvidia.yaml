# No-Skill Baseline Configuration - NVIDIA Nemotron-3-Nano-30B-A3B
# Measures raw model capability without skill guidance

model:
  task: openrouter/nvidia/nemotron-3-nano-30b-a3b:free

workers:
  count: 1  # Conservative for free models

skill:
  no_skill: true

tasks:
  splits:
    - train

execution:
  timeout: 600

output:
  dir: results/baselines
  save_trajectories: true
