# Baseline Models Configuration
# Used by: make baseline-<model>-<skill>

# Models to benchmark
models:
  - name: stepfun
    model: openrouter/stepfun/step-3.5-flash:free
  
  - name: openai
    model: openrouter/openai/gpt-oss-120b:free
  
  - name: nvidia
    model: openrouter/nvidia/nemotron-3-nano-30b-a3b:free
  
  - name: minimax25
    model: opencode/minimax-m2.5-free

  - name: kimik25
    model: opencode/kimi-k2.5-free

  - name: glm5
    model: opencode/glm-5-free

# Skill variants
skills:
  - name: no_skill
    no_skill: true
  
  - name: skill
    path: skills/testing-r-packages-orig.md

# Common settings
common:
  workers: 1
  timeout: 600
  splits:
    - train
  docker_image: posit-gskill-eval:latest
  output_dir: results/baselines
