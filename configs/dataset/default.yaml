# Dataset Configuration
# Controls how tasks are split, validated, and exported

# Split ratios for train/dev/test (should sum to 1.0)
splits:
  train: 0.70
  dev: 0.15
  test: 0.15

# Random seed for reproducible splits
# Using a fixed seed ensures the same tasks go to the same splits
seed: 42

# Input/output directories
# Use different paths to avoid reprocessing drift on repeated runs
input_dir: "tasks_v1"
output_dir: "tasks_v1_split"

# Validation settings
validation:
  # Strict mode: fail on warnings
  strict: false
  # Skip invalid tasks during split operations
  skip_invalid: true

# Decontamination settings
decontamination:
  # Check for duplicates and cross-split contamination
  check: true

# Metadata fields to track
metadata:
  # Track when dataset was created
  track_freshness: true
  # Track decontamination status
  track_decontamination: true
  # Track source fingerprint
  track_source_fingerprint: true

# Export settings
export:
  # Include task IDs in manifest
  include_task_ids: true
  # Include full decontamination report
  include_decontamination_report: true
