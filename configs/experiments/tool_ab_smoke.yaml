# Tool A/B Comparison Smoke Test Configuration
# Minimal config for testing A/B tool comparison experiments
#
# This configuration runs paired experiments where only the tool profile
# varies (control vs treatment), while task/model/support/seed are held constant.

# Experiment metadata
name: "tool_ab_smoke"
description: "Quick smoke test for A/B tool comparison experiments"
schema_version: "1.0"

# Models to evaluate (references configs/llm.yaml)
# Use a single fast model for smoke testing
models:
  names:
    - glm-5-plan

# Task selection
tasks:
  selection: "splits"
  splits:
    - dev
  dir: "tasks"
  max_tasks: 2  # Limit to 2 tasks for smoke testing

# Skill configuration (no skill for baseline)
skill:
  no_skill: true

# Execution settings
execution:
  harness: "pi_docker"
  sandbox_profile: "strict"
  auth_policy: "env"
  timeout: 300
  docker_image: "posit-gskill-eval:latest"
  repeats: 1
  parallel_workers: 1
  save_trajectories: true
  save_traces: false

# Retry configuration
retry:
  strategy: "none"
  max_retries: 0

# Output configuration
output:
  dir: "results/experiments"
  save_intermediate: true

# Determinism settings
determinism:
  seed: 42
  freeze_model_resolution: true
  freeze_config: true

# A/B Tool Comparison Configuration
# This is the key configuration for tool A/B experiments
settings:
  ab_tools:
    # Control tool profiles (baseline)
    control:
      - "configs/profiles/tools/default.yaml"
    
    # Treatment tool profiles (variants to compare)
    treatment:
      - "configs/profiles/tools/strict.yaml"
      - "configs/profiles/tools/minimal.yaml"
    
    # Support profile to use (held constant across pairs)
    support_profiles:
      - "configs/profiles/support/baseline_none.yaml"
    
    # Optional: Bootstrap settings for significance testing
    bootstrap:
      samples: 10000
      confidence_level: 0.95

# Pairing configuration (optional - enables support profile pairing)
# For tool A/B, this is typically disabled
pairing:
  enabled: false
