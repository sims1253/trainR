# R Benchmark Smoke Test Configuration
# Minimal config for smoke testing the unified experiment runner

# Experiment metadata
name: "r_bench_smoke"
description: "Quick smoke test for R package benchmark evaluation"
schema_version: "1.0"

# Models to evaluate (references configs/llm.yaml)
# Use a single model for quick smoke validation
models:
  names:
    - gpt-oss-120b

# Task selection
tasks:
  selection: "task_id"
  task_id: "task-c742880b"
  dir: "tasks"

# Skill configuration (no skill for baseline)
skill:
  no_skill: true

# Execution settings
execution:
  harness: "pi_docker"
  sandbox_profile: "networked"
  auth_policy: "env"
  timeout: 900
  docker_image: "posit-gskill-eval:latest"
  repeats: 1
  parallel_workers: 1
  save_trajectories: true
  save_traces: false

# Retry configuration
retry:
  strategy: "none"
  max_retries: 0

# Output configuration
output:
  dir: "results/experiments"
  save_intermediate: true

# Determinism settings
determinism:
  seed: 42
  freeze_model_resolution: true
  freeze_config: true
