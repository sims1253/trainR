name: "kimi_test"
description: "Quick test for kimi-k2.5 model"
schema_version: "1.0"

models:
  names:
    - kimi-k2.5

tasks:
  selection: "task_id"
  task_id: "task-78f46711"
  dir: "tasks"

skill:
  no_skill: true

execution:
  harness: "pi_docker"
  sandbox_profile: "networked"
  auth_policy: "env"
  timeout: 300
  docker_image: "posit-gskill-eval:latest"
  repeats: 1
  parallel_workers: 1
  provider_parallel_limits:
    opencode: 1
  save_trajectories: true
  save_traces: false

retry:
  strategy: "none"
  max_retries: 0

output:
  dir: "results/experiments"
  save_intermediate: true

determinism:
  seed: 42
  freeze_model_resolution: true
  freeze_config: true
