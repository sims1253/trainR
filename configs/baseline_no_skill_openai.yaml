# No-Skill Baseline Configuration - OpenAI GPT-OSS-120B
# Measures raw model capability without skill guidance

model:
  task: openrouter/openai/gpt-oss-120b:free

workers:
  count: 1  # Conservative for free models

skill:
  no_skill: true

tasks:
  splits:
    - train

execution:
  timeout: 600

output:
  dir: results/baselines
  save_trajectories: true
