version: '3.8'

services:
  benchmark:
    build:
      context: .
      dockerfile: Dockerfile.benchmark
    # Resource limits for safety
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 512M
    # Read-only source data, writable output
    volumes:
      # Source data - READ-ONLY (shared by all containers)
      - ./data/kaggle:/opt/kaggle-data:ro
      # Output directory - WRITABLE (results persisted to host)
      - ./output:/workspace/output
      # Optional: mount scripts for development
      - ./tasks:/workspace/tasks:ro
    environment:
      - KAGGLE_COMPETITION=${KAGGLE_COMPETITION:-titanic}
    # Each container gets fresh workspace (not shared)
    tmpfs:
      - /workspace/data:size=1G,mode=1777
    # Clean up after exit
    stop_grace_period: 10s

# Named volumes (optional, for persistence)
volumes:
  output:
