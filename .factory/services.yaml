# grist-mill services and commands manifest
# Single source of truth for all commands and services

commands:
  test: uv run pytest tests/test_package.py -v
  test_all: uv run pytest tests/ -m "not integration_local and not integration_provider" -x -q
  test_grist_mill: uv run pytest tests/test_package.py tests/test_schemas.py tests/test_artifact.py tests/test_interfaces.py tests/test_config.py tests/test_cli.py tests/test_registry.py tests/test_telemetry.py tests/test_result_parser.py tests/test_dataset.py tests/test_mutation.py tests/test_ast_parser.py tests/test_harness.py tests/test_agent.py tests/test_tools.py tests/test_binding.py tests/test_local_runner.py tests/test_environments.py tests/test_task_pipeline.py tests/test_docker_runner.py -x -q
  lint: uv run ruff check --fix && uv run ruff format
  typecheck: uv run ty check src/grist_mill/
  version: uv run grist-mill --version

services: {}
