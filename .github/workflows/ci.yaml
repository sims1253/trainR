# =============================================================================
# CI Workflow for trainR - Phase G Multi-Job Architecture
# =============================================================================
# Runs on: push to main/master, pull requests
# 
# Jobs:
#   1. fast - Lint, type, unit tests, contracts (always runs, fast)
#   2. integration-local - Harness tests, Docker validation (runs after fast)
#   3. integration-provider - Real provider tests (main only, secrets-gated)
#   4. visualizer - Frontend CI (conditional on visualizer/package.json)
# =============================================================================

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel in-progress runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.5.x"

jobs:
  # ===========================================================================
  # Fast job: lint, type, unit tests, schema/contract validation
  # ===========================================================================
  fast:
    name: Fast CI
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run ty check . || true  # Non-blocking

      - name: Unit tests
        run: uv run pytest tests/ -v --tb=short -x

      - name: Validate contracts
        run: uv run python scripts/validate_contracts.py

      - name: Schema validation
        run: |
          uv run python -c "from bench.schema.v1 import ManifestV1, ResultV1; print('Schema OK')"

  # ===========================================================================
  # Integration-local: Docker + stubbed harness
  # ===========================================================================
  integration-local:
    name: Integration (Local)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: fast

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Run harness integration tests
        run: uv run pytest tests/test_harness_integration.py -v --tb=short
        # No continue-on-error - failures should block

      - name: Run sandbox/tooling integration tests
        run: uv run pytest tests/integration/ -v --tb=short -m "integration_local or not integration_local"
        # Run both marked and unmarked integration tests
        # integration_local tests will skip if Docker is unavailable

      - name: Check Docker image availability
        run: |
          if ! docker image inspect posit-gskill-eval:latest &>/dev/null; then
            echo "::error::Docker image posit-gskill-eval:latest not found. Build it first."
            exit 1
          fi
        continue-on-error: true  # Keep this as optional check

  # ===========================================================================
  # Integration-provider: Real provider tests (secrets-gated)
  # ===========================================================================
  integration-provider:
    name: Integration (Provider)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: fast
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: provider-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Provider integration tests (first benchmark)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          Z_AI_API_KEY: ${{ secrets.Z_AI_API_KEY }}
        run: |
          missing=()
          for key in OPENROUTER_API_KEY OPENCODE_API_KEY Z_AI_API_KEY; do
            if [ -z "${!key:-}" ]; then
              missing+=("$key")
            fi
          done

          if [ "${#missing[@]}" -eq 3 ]; then
            echo "No provider secrets configured - skipping provider integration tests"
            exit 0
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Provider integration requires all three secrets. Missing: ${missing[*]}"
            exit 1
          fi

          uv run pytest tests/integration/test_first_benchmark_integration.py -v --tb=short -m integration_provider

  # ===========================================================================
  # Visualizer CI (conditional)
  # ===========================================================================
  visualizer:
    name: Visualizer
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: fast
    if: hashFiles('visualizer/package.json') != ''

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        working-directory: visualizer
        run: bun install

      - name: Lint
        working-directory: visualizer
        run: bun run lint || true

      - name: Build
        working-directory: visualizer
        run: bun run build
